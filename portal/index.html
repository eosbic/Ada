function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ empresa:"", industria:"retail", adaName:"Ada", personalidad:"directo", ciudad:"", empleados:"", productos:"", intereses:[], website:"", linkedin:"", instagram:"", facebook:"", kpis:"", clientes:"", competidores:"" });
  const [saving, setSaving] = useState(false);
  const steps = 8;
  const toggle = (item) => { setData(p=>({...p,intereses:p.intereses.includes(item)?p.intereses.filter(i=>i!==item):[...p.intereses,item]})); };
  const API = "https://backend-ada.duckdns.org/config/onboarding";
  const callOB = async (response) => {
    try { const r = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({empresa_id:MOCK_USER.empresa_id,user_id:MOCK_USER.user_id,user_name:MOCK_USER.name,response:response})}); return await r.json(); } catch(e) { console.error(e); return null; }
  };
  const handleNext = async () => {
    setSaving(true);
    if (step===0) {
      // welcome → ada_name → company_info
      await callOB("");
      await callOB(data.adaName || "Ada");
      await callOB(`${data.empresa}, empresa de ${data.industria} ubicada en ${data.ciudad}`);
    } else if (step===1) {
      // products
      await callOB(data.productos || "productos y servicios generales");
    } else if (step===2) {
      // business_details: web, redes, KPIs, clientes, competidores
      const bizInfo = [
        data.website ? `web: ${data.website}` : "",
        data.linkedin ? `linkedin: ${data.linkedin}` : "",
        data.instagram ? `instagram: ${data.instagram}` : "",
        data.facebook ? `facebook: ${data.facebook}` : "",
        data.kpis ? `KPIs: ${data.kpis}` : "",
        data.clientes ? `clientes principales: ${data.clientes}` : "",
        data.competidores ? `competidores: ${data.competidores}` : "",
      ].filter(Boolean).join(", ");
      await callOB(bizInfo || "sin información adicional");
    } else if (step===3) {
      // size_city: empleados y ciudad
      await callOB(`${data.empleados || "5"} empleados, ${data.ciudad || "Colombia"}`);
    } else if (step===4) {
      // interests
      await callOB(data.intereses.join(", ") || "ventas, clientes");
    } else if (step===5) {
      // style + confirmation automática
      await callOB(data.personalidad || "directo");
      await callOB("sí");
      setSaving(false);
      setStep(s=>s+1);
      return;
    } else if (step===6) {
      // conexiones — solo avanzar, no llamar API
      setSaving(false);
      setStep(s=>s+1);
      return;
    } else if (step===7) {
      // resumen final — completar
      setSaving(false);
      onComplete();
      return;
    }
    setSaving(false);
    setStep(s=>s+1);
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:"var(--bg-base)"}}>
      <div className="onboarding-wrap" style={{width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div style={{fontFamily:"var(--font-hud)",fontSize:"12px",letterSpacing:"3px",color:"var(--text-3)",textTransform:"uppercase"}}>Bienvenido a</div>
          <div style={{fontFamily:"var(--font-hud)",fontSize:"28px",fontWeight:"900",color:"var(--accent)",letterSpacing:"4px",marginTop:"4px"}}>ADA</div>
        </div>
        <div className="onboarding-progress">{Array.from({length:steps}).map((_,i)=>(<div key={i} className={`ob-step ${i<step?"done":i===step?"active":""}`}/>))}</div>
        <div className="ob-card">
          {step===0 && (<>
            <div className="ob-step-num">Paso 1 de {steps}</div>
            <div className="ob-title">Cuéntanos sobre tu empresa</div>
            <div className="ob-desc">Esta información permite a Ada personalizar todas sus respuestas.</div>
            <div className="form-group"><label className="form-label">Nombre de la empresa</label><input value={data.empresa} onChange={e=>setData(p=>({...p,empresa:e.target.value}))} placeholder="Ej: Distribuidora Norte"/></div>
            <div className="form-group"><label className="form-label">Industria</label><select value={data.industria} onChange={e=>setData(p=>({...p,industria:e.target.value}))}>{["retail","servicios","manufactura","tecnologia","salud","educacion","alimentos","construccion","consultoria","restaurante","financiero","agricultura"].map(i=>(<option key={i} value={i}>{i}</option>))}</select></div>
            <div className="form-group"><label className="form-label">Ciudad</label><input value={data.ciudad} onChange={e=>setData(p=>({...p,ciudad:e.target.value}))} placeholder="Ej: Cali, Colombia"/></div>
            <div className="form-group"><label className="form-label">Nombre de tu asistente</label><input value={data.adaName} onChange={e=>setData(p=>({...p,adaName:e.target.value}))} placeholder="Ada"/></div>
          </>)}
          {step===1 && (<>
            <div className="ob-step-num">Paso 2 de {steps}</div>
            <div className="ob-title">¿Cuáles son tus productos o servicios?</div>
            <div className="ob-desc">Dinos los principales, separados por comas.</div>
            <div className="form-group"><label className="form-label">Productos / Servicios</label><input value={data.productos} onChange={e=>setData(p=>({...p,productos:e.target.value}))} placeholder="Ej: software, landing pages, apps"/></div>
          </>)}
          {step===2 && (<>
            <div className="ob-step-num">Paso 3 de {steps}</div>
            <div className="ob-title">Presencia digital y métricas clave</div>
            <div className="ob-desc">Cuéntanos sobre tu presencia online y los indicadores que más te importan.</div>
            <div className="form-group"><label className="form-label">🌐 Sitio web</label><input value={data.website} onChange={e=>setData(p=>({...p,website:e.target.value}))} placeholder="https://tuempresa.com"/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <div className="form-group"><label className="form-label">💼 LinkedIn</label><input value={data.linkedin} onChange={e=>setData(p=>({...p,linkedin:e.target.value}))} placeholder="URL de LinkedIn"/></div>
              <div className="form-group"><label className="form-label">📸 Instagram</label><input value={data.instagram} onChange={e=>setData(p=>({...p,instagram:e.target.value}))} placeholder="@tuempresa"/></div>
            </div>
            <div className="form-group"><label className="form-label">📊 KPIs que más revisas</label><input value={data.kpis} onChange={e=>setData(p=>({...p,kpis:e.target.value}))} placeholder="Ej: ventas diarias, margen bruto, cartera vencida"/></div>
            <div className="form-group"><label className="form-label">🤝 Principales clientes</label><input value={data.clientes} onChange={e=>setData(p=>({...p,clientes:e.target.value}))} placeholder="Ej: Almacenes Éxito, Grupo Bolívar"/></div>
            <div className="form-group"><label className="form-label">⚔️ Principales competidores</label><input value={data.competidores} onChange={e=>setData(p=>({...p,competidores:e.target.value}))} placeholder="Ej: Empresa X, Competidor Y"/></div>
          </>)}
          {step===3 && (<>
            <div className="ob-step-num">Paso 4 de {steps}</div>
            <div className="ob-title">Tamaño de tu equipo</div>
            <div className="ob-desc">Esto ayuda a Ada a entender tu operación.</div>
            <div className="form-group"><label className="form-label">Número de empleados</label><input value={data.empleados} onChange={e=>setData(p=>({...p,empleados:e.target.value}))} placeholder="Ej: 15"/></div>
          </>)}
          {step===4 && (<>
            <div className="ob-step-num">Paso 5 de {steps}</div>
            <div className="ob-title">Preferencias y prioridades</div>
            <div className="ob-desc">Selecciona lo que te importa más.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"12px"}}>{["ventas","cartera","inventario","clientes","proyectos","márgenes","crecimiento","personal"].map(i=>(<div key={i} className={`perm-toggle ${data.intereses.includes(i)?"on":""}`} style={{padding:"12px"}} onClick={()=>toggle(i)}><div className="perm-dot"/><span style={{textTransform:"capitalize"}}>{i}</span></div>))}</div>
          </>)}
          {step===5 && (<>
            <div className="ob-step-num">Paso 6 de {steps}</div>
            <div className="ob-title">Estilo de comunicación</div>
            <div className="ob-desc">¿Cómo prefieres que {data.adaName||"Ada"} se comunique?</div>
            <div className="form-group"><label className="form-label">Estilo de comunicación</label><select value={data.personalidad} onChange={e=>setData(p=>({...p,personalidad:e.target.value}))}><option value="directo">🎯 Directo — sin rodeos</option><option value="detallado">📝 Detallado — con contexto</option><option value="casual">😊 Casual — como colega</option><option value="formal">👔 Formal — profesional</option></select></div>
          </>)}
          {step===6 && (<>
            <div className="ob-step-num">Paso 7 de {steps}</div>
            <div className="ob-title">Conecta tus herramientas</div>
            <div className="ob-desc">Conecta {data.adaName||"Ada"} con tus aplicaciones. Puedes hacerlo después desde Configuración.</div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>{[{icon:"📧",name:"Gmail",desc:"Leer y enviar emails",svc:"google"},{icon:"📅",name:"Google Calendar",desc:"Gestionar eventos",svc:"google"},{icon:"📋",name:"Notion",desc:"Documentos y wiki",svc:"notion"},{icon:"📊",name:"Plane.so",desc:"Proyectos y tareas",svc:"plane"}].map(t=>(<div key={t.name} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",background:"var(--bg-layer2)",border:"1px solid var(--border)",borderRadius:"var(--r-md)"}}><span style={{fontSize:"20px"}}>{t.icon}</span><div style={{flex:1}}><div style={{fontWeight:"600",color:"var(--text-1)",fontSize:"15px"}}>{t.name}</div><div style={{fontSize:"12px",color:"var(--text-3)"}}>{t.desc}</div></div><button className="btn btn-ghost btn-sm" onClick={async()=>{if(t.svc==="notion"){const ak=prompt("API Key de Notion:");if(!ak)return;try{await fetch("https://backend-ada.duckdns.org/oauth/connect-service",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({empresa_id:MOCK_USER.empresa_id,service:"notion",credentials:{api_key:ak}})});alert("Notion conectado");}catch(e){alert("Error");}return;}if(t.svc==="plane"){const ak=prompt("API Key de Plane:");if(!ak)return;const ws=prompt("Workspace de Plane:");if(!ws)return;try{await fetch("https://backend-ada.duckdns.org/oauth/connect-service",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({empresa_id:MOCK_USER.empresa_id,service:"plane",credentials:{api_key:ak,workspace:ws,base_url:"https://api.plane.so/api/v1"}})});alert("Plane conectado");}catch(e){alert("Error");}return;}try{const r=await fetch(`https://backend-ada.duckdns.org/oauth/connect/${t.svc}/${MOCK_USER.empresa_id}`);const d=await r.json();if(d.auth_url)window.open(d.auth_url,"_blank","width=600,height=700");}catch(e){alert("Error");}}}>Conectar</button></div>))}</div>
          </>)}
          {step===7 && (<>
            <div className="ob-step-num">✅ Configuración completada</div>
            <div className="ob-title">¡{data.adaName||"Ada"} está lista para {data.empresa||"tu empresa"}!</div>
            <div className="ob-desc">Tu asistente ya tiene toda la información de tu negocio.</div>
            <div style={{display:"flex",flexDirection:"column",gap:"8px",padding:"16px",background:"var(--bg-layer2)",border:"1px solid var(--border)",borderRadius:"var(--r-lg)"}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>🏢 Empresa</span><strong style={{color:"var(--text-1)"}}>{data.empresa}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>💼 Industria</span><strong style={{color:"var(--text-1)"}}>{data.industria}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>📍 Ciudad</span><strong style={{color:"var(--text-1)"}}>{data.ciudad}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>📦 Productos</span><strong style={{color:"var(--text-1)"}}>{data.productos}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>🌐 Web</span><strong style={{color:"var(--text-1)"}}>{data.website||"no proporcionado"}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>📊 KPIs</span><strong style={{color:"var(--text-1)"}}>{data.kpis||"por definir"}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>🤝 Clientes</span><strong style={{color:"var(--text-1)"}}>{data.clientes||"por definir"}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>⚔️ Competidores</span><strong style={{color:"var(--text-1)"}}>{data.competidores||"por definir"}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>👥 Empleados</span><strong style={{color:"var(--text-1)"}}>{data.empleados}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>🤖 Asistente</span><strong style={{color:"var(--text-1)"}}>{data.adaName}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>💬 Estilo</span><strong style={{color:"var(--text-1)"}}>{data.personalidad}</strong></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"14px"}}><span style={{color:"var(--text-3)"}}>📊 Prioridades</span><strong style={{color:"var(--text-1)"}}>{data.intereses.join(", ")}</strong></div>
            </div>
          </>)}
          <div style={{display:"flex",gap:"8px",marginTop:"24px",justifyContent:"space-between"}}>
            {step>0 ? <button className="btn btn-ghost" onClick={()=>setStep(s=>s-1)}>← Anterior</button> : <div/>}
            <button className="btn btn-primary" disabled={saving} onClick={handleNext}>{saving?"⏳ Guardando...":step===5?"✅ Guardar configuración":step===7?"🚀 Comenzar con Ada":"Continuar →"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════
// Session helpers
function saveSession(data){try{localStorage.setItem('ada_session',JSON.stringify(data));}catch(e){console.error('Save session error:',e);}}
function loadSession(){try{const s=localStorage.getItem('ada_session');return s?JSON.parse(s):null;}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem('ada_session');}catch(e){}}

function App() {
  const saved = loadSession();
  // Restore session IMMEDIATELY before any render
  if(saved){
    MOCK_USER.empresa_id=saved.empresa_id||'';
    MOCK_USER.user_id=saved.user_id||'';
    MOCK_USER.name=saved.name||'';
    MOCK_USER.role=saved.role||'';
    MOCK_USER.initials=saved.initials||'--';
    MOCK_USER.empresa=saved.empresa||'';
    MOCK_USER.token=saved.token||'';
  }
  const [theme, setTheme] = useState(saved?.theme||'void');
  const [loggedIn, setLoggedIn] = useState(!!saved);
  const [onboarded, setOnboarded] = useState(saved?.onboarded||false);
  const [page, setPage] = useState('dashboard');
  const [reportId, setReportId] = useState(null);

  useEffect(() => {
    if (window.__hideLoader) window.__hideLoader();
  }, []);
  const [loginEmail, setLoginEmail] = useState('');
  const [loginPwd, setLoginPwd]  = useState('');
  const [loginStatus, setLoginStatus] = useState({ msg:'', type:'' });
  const [loginLoading, setLoginLoading] = useState(false);
  const [showNotif, setShowNotif] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [clock, setClock] = useState('');

  useEffect(() => {
    document.body.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    const tick = () => setClock(new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
    tick();
    const id = setInterval(tick,1000);
    return ()=>clearInterval(id);
  }, []);

  const addToast = useCallback((msg, type='info') => {
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  }, []);

  const handleLogin = async () => {
    if (!loginEmail || !loginPwd) { setLoginStatus({msg:'Completa los campos',type:'error'}); return; }
    setLoginLoading(true);
    setLoginStatus({msg:'Autenticando...', type:'ok'});
    try {
      const r = await fetch('https://backend-ada.duckdns.org/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:loginEmail,password:loginPwd})});
      if(r.ok) {
        const data = await r.json();
        const token = data.access_token;
        // Decode JWT payload to get user_id and empresa_id
        const payload = JSON.parse(atob(token.split('.')[1]));
        MOCK_USER.empresa_id = payload.empresa_id || '';
        MOCK_USER.user_id = payload.user_id || '';
        MOCK_USER.token = token;
        // Fetch user profile
        try {
          const profileR = await fetch(`https://backend-ada.duckdns.org/team/members?empresa_id=${MOCK_USER.empresa_id}`);
          if (profileR.ok) {
            const profileData = await profileR.json();
            const me = profileData.members?.find(m => m.user_id === MOCK_USER.user_id);
            if (me) {
              MOCK_USER.name = me.display_name;
              MOCK_USER.role = me.role;
              MOCK_USER.initials = me.display_name.split(' ').map(n=>n[0]).join('').slice(0,2);
            }
          }
          // Fetch company name
          const compR = await fetch(`https://backend-ada.duckdns.org/api/v1/reports?empresa_id=${MOCK_USER.empresa_id}&limit=1`);
        } catch(e) { console.log('Profile fetch optional:', e); }
        // Set name from login response, then email as fallback
        if (!MOCK_USER.name && data.nombre) {
          MOCK_USER.name = data.nombre;
          MOCK_USER.initials = data.nombre.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
        }
        if (!MOCK_USER.name) {
          MOCK_USER.name = loginEmail.split('@')[0];
          MOCK_USER.initials = MOCK_USER.name.slice(0,2).toUpperCase();
        }
        MOCK_USER.empresa = '';
        // Check if onboarding is completed via real endpoint
        let hasOnboarding = false;
        try {
          const obR = await fetch(`https://backend-ada.duckdns.org/empresas/onboarding-status/${MOCK_USER.empresa_id}`);
          if (obR.ok) {
            const obData = await obR.json();
            if (obData.completed) {
              hasOnboarding = true;
              MOCK_USER.empresa = obData.company_name || '';
            }
          }
        } catch(e) { console.log('Onboarding check error:', e); }
        setLoginStatus({msg:'Acceso concedido',type:'ok'});
        saveSession({empresa_id:MOCK_USER.empresa_id,user_id:MOCK_USER.user_id,name:MOCK_USER.name,role:MOCK_USER.role,initials:MOCK_USER.initials,empresa:MOCK_USER.empresa,token:MOCK_USER.token,onboarded:hasOnboarding,theme:'void'});
        PERSISTED_CHAT_MESSAGES = [];
        setTimeout(()=>{ setLoggedIn(true); setOnboarded(hasOnboarding); },600);
      } else {
        const err = await r.json().catch(()=>({}));
        setLoginStatus({msg: err.detail || 'Credenciales inválidas', type:'error'});
      }
    } catch(e) {
      console.error('Login error:', e);
      setLoginStatus({msg:'Error de conexión con el servidor',type:'error'});
    }
    setLoginLoading(false);
  };

  const navTo = (p, id) => {
    setPage(p);
    if(id) setReportId(id);
    setShowNotif(false);
  };

  const PAGE_TITLES = {
    dashboard:'Dashboard Ejecutivo',
    chat:'Chat',
    vault:'Vault de Reportes',
    report:'Detalle de Reporte',
    approvals:'Aprobaciones',
    tokens:'Monitor de Tokens',
    settings:'Configuración',
  };

  const NAV_ITEMS = [
    { id:'dashboard', icon:'📊', label:'Dashboard' },
    { id:'brief',     icon:'🌅', label:'Resumen Diario' },
    { id:'chat',      icon:'💬', label:'Chat' },
    { id:'vault',     icon:'📁', label:'Vault de Reportes' },
    { id:'approvals', icon:'✅', label:'Aprobaciones' },
    { id:'tokens',    icon:'⚡', label:'Monitor de Tokens' },
    { id:'settings',  icon:'⚙️', label:'Configuración' },
  ];

  if (!loggedIn) {
    return (
      <div className="login-screen">
        <div className="login-ring" style={{width:'400px',height:'400px'}}/>
        <div className="login-ring" style={{width:'280px',height:'280px',animationDelay:'1.3s'}}/>
        <div className="login-ring" style={{width:'180px',height:'180px',animationDelay:'0.7s'}}/>

        <div className="login-card">
          <div className="login-logo">
            <div className="login-mark">A</div>
            <h1>ADA</h1>
            <p>Asistente Agéntica</p>
          </div>
          <div className="login-divider"/>
          <label className="login-label">Correo electrónico</label>
          <input className="login-input" type="email" placeholder="ceo@empresa.com" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
          <label className="login-label">Contraseña</label>
          <input className="login-input" type="password" placeholder="••••••••" value={loginPwd} onChange={e=>setLoginPwd(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} style={{marginBottom:'20px'}}/>
          <button className="login-btn" disabled={loginLoading} onClick={handleLogin}>
            {loginLoading?'Autenticando...':'Iniciar Sesión'}
          </button>
          <div className={`login-status ${loginStatus.type}`}>{loginStatus.msg}</div>

          <div className="theme-picker-login">
            {[{id:'void',l:'🌌 Void'},{id:'standard',l:'☀️ Estándar'},{id:'system',l:'💻 Sistema'}].map(t=>(
              <button key={t.id} className={`tp-btn ${theme===t.id?'active':''}`} onClick={()=>setTheme(t.id)}>{t.l}</button>
            ))}
          </div>

          <div style={{marginTop:'16px',textAlign:'center',fontSize:'12px',color:'var(--text-3)',fontFamily:'var(--font-mono)'}}>
            demo: cualquier @email + 4+ caracteres
          </div>
        </div>
      </div>
    );
  }

  if (!onboarded) {
    return (
      <>
        <Onboarding onComplete={async()=>{
          // Run onboarding via API
          try {
            const base = 'https://backend-ada.duckdns.org/config/onboarding';
            const body = {empresa_id:MOCK_USER.empresa_id, user_id:MOCK_USER.user_id, user_name:MOCK_USER.name};
            // Step 1: init
            await fetch(base,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(MOCK_USER.token||'')},body:JSON.stringify(body)});
          } catch(e) { console.error('Onboarding API error:', e); }
          setOnboarded(true);
          addToast('¡Bienvenido a Ada V5.0!','success');
        }} />
        <Toast toasts={toasts}/>
      </>
    );
  }

  return (
    <>
      <div className="app">
        {/* SIDEBAR */}
        <aside className="sidebar">
          <div className="sb-logo">
            <div className="sb-mark">A</div>
            <div>
              <div className="sb-title">ADA</div>
              <div className="sb-subtitle" style={{fontSize:'12px',letterSpacing:'1.5px',color:'var(--accent)',opacity:0.8}}>Asistente Agéntica</div>
            </div>
          </div>

          <div className="sb-section">Navegación</div>
          {NAV_ITEMS.map(n=>(
            <div key={n.id} className={`nav-item ${page===n.id||page==='report'&&n.id==='vault'?'active':''}`} onClick={()=>navTo(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
              {n.badge && <span className="nav-badge">{n.badge}</span>}
            </div>
          ))}

          <div style={{margin:'8px 0 4px'}}><div className="sb-section">Recursos</div></div>
          <div className="nav-item" onClick={()=>navTo('chat')}>
            <span className="nav-icon">🎤</span>
            Asistente de Voz
            <span style={{marginLeft:'auto',fontSize:'8px',fontFamily:'var(--font-hud)',letterSpacing:'1px',color:'var(--text-3)',border:'1px solid var(--border)',padding:'1px 4px',borderRadius:'3px'}}>BETA</span>
          </div>
          <div style={{margin:'8px 0 4px'}}><div className="sb-section">Token Monitor</div></div>
          <TokenSidebar/>

          <div className="sb-footer">
            <div className="user-chip">
              <div className="user-avatar">{MOCK_USER.initials}</div>
              <div>
                <div className="user-name">{MOCK_USER.name}</div>
                <div className="user-role">{MOCK_USER.role} · {MOCK_USER.empresa}</div>
              </div>
            </div>
            <button className="btn-logout" onClick={()=>{clearSession();MOCK_USER.empresa_id='';MOCK_USER.user_id='';MOCK_USER.name='';setLoggedIn(false);setOnboarded(false);setLoginEmail('');setLoginPwd('');}}>
              CERRAR SESIÓN
            </button>
          </div>
        </aside>

        {/* MAIN */}
        <main className="main">
          <header className="topbar">
            <div className="topbar-title">{PAGE_TITLES[page]||'Ada V5.0'}</div>
            <div className="topbar-right">
              <div className="topbar-status">
                <div className="status-dot"/>
                <span>Ada online</span>
              </div>
              <ThemeSwitcher theme={theme} setTheme={setTheme}/>
              <div className="topbar-clock">{clock}</div>
              <div style={{position:'relative'}}>
                <button className="notif-btn" onClick={()=>setShowNotif(p=>!p)}>
                  🔔
                  <span className="notif-badge">4</span>
                </button>
                {showNotif && (
                  <div className="notif-panel">
                    <div className="notif-panel-title">Notificaciones</div>
                    {NOTIFICATIONS.map((n,i)=>(
                      <div key={i} className="notif-item">
                        <div className={`notif-dot ${n.type}`}/>
                        <div className="notif-text">{n.text}</div>
                        <div className="notif-time">{n.time}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </header>

          <div className="page">
            {page==='dashboard' && <Dashboard onNav={navTo}/>}
            {page==='brief'      && <DailyBrief/>}
            {page==='chat'      && <Chat addToast={addToast}/>}
            {page==='vault'     && <Vault onNav={navTo}/>}
            {page==='report'    && <ReportDetail reportId={reportId} onBack={()=>navTo('vault')} onNav={navTo}/>}
            {page==='approvals' && <Approvals addToast={addToast}/>}
            {page==='tokens'    && <TokenMonitor/>}
            {page==='settings'  && <Settings theme={theme} setTheme={setTheme}/>}
          </div>
        </main>
      </div>

      {showNotif && <div style={{position:'fixed',inset:0,zIndex:199}} onClick={()=>setShowNotif(false)}/>}

      <Toast toasts={toasts}/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);


</script>


</body>
</html>
