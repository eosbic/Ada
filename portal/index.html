/* ═══════════════════════════════════════════════════════════
   THEME SYSTEM
   ═══════════════════════════════════════════════════════════ */
:root {
  --font-hud:  'Orbitron', monospace;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --sidebar-w: 228px;
  --header-h:  52px;
  --r-sm: 4px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px;
  --transition: 0.2s ease;
}

/* ── THEME: VOID (dark futurista) ── */
[data-theme="void"] {
  --bg-base:    #050810;
  --bg-layer1:  #080c18;
  --bg-layer2:  #0c1220;
  --bg-card:    #101828;
  --bg-input:   #0a1020;
  --border:     #1a2840;
  --border-glow: rgba(0,229,255,0.35);
  --accent:     #00e5ff;
  --accent-dim: #00b8cc;
  --accent-glow:rgba(0,229,255,0.15);
  --accent-glow2:rgba(0,229,255,0.05);
  --accent2:    #7c3aed;
  --green:      #00ff9d;
  --red:        #ff3d5a;
  --yellow:     #ffd60a;
  --orange:     #ff6b35;
  --text-1:     #e0f4ff;
  --text-2:     #7eafc9;
  --text-3:     #3d6478;
  --text-code:  #00ff9d;
  --scrollbar:  #1a2840;
  --overlay:    rgba(5,8,16,0.85);
  --grid-line:  rgba(0,229,255,0.03);
  --scan-line:  rgba(0,0,0,0.05);
  --glow-strong: 0 0 20px rgba(0,229,255,0.3);
  --tag-bg:     rgba(0,229,255,0.08);
  --tag-border: rgba(0,229,255,0.2);
}

/* ── THEME: STANDARD (light) ── */
[data-theme="standard"] {
  --bg-base:    #f4f6fa;
  --bg-layer1:  #ffffff;
  --bg-layer2:  #eaecf4;
  --bg-card:    #ffffff;
  --bg-input:   #eaecf4;
  --border:     #c8d0e0;
  --border-glow: rgba(0,64,180,0.3);
  --accent:     #0044cc;
  --accent-dim: #0033a0;
  --accent-glow:rgba(0,64,180,0.12);
  --accent-glow2:rgba(0,64,180,0.05);
  --accent2:    #4c1d95;
  --green:      #0a5c2e;
  --red:        #9b1c1c;
  --yellow:     #78350f;
  --orange:     #9a3412;
  --text-1:     #090f1a;
  --text-2:     #172136;
  --text-3:     #3d5470;
  --text-code:  #0a5c2e;
  --scrollbar:  #a8b8cc;
  --overlay:    rgba(244,246,250,0.93);
  --grid-line:  rgba(0,64,180,0.03);
  --scan-line:  transparent;
  --glow-strong: 0 1px 8px rgba(0,102,230,0.15);
  --tag-bg:     rgba(0,102,230,0.07);
  --tag-border: rgba(0,102,230,0.18);
}

/* ── THEME: SYSTEM (developer dark) ── */
[data-theme="system"] {
  --bg-base:    #1e1e1e;
  --bg-layer1:  #252526;
  --bg-layer2:  #2d2d30;
  --bg-card:    #252526;
  --bg-input:   #1e1e1e;
  --border:     #3e3e42;
  --border-glow: rgba(86,156,214,0.3);
  --accent:     #569cd6;
  --accent-dim: #4e8cbf;
  --accent-glow:rgba(86,156,214,0.12);
  --accent-glow2:rgba(86,156,214,0.05);
  --accent2:    #c678dd;
  --green:      #4ec9b0;
  --red:        #f44747;
  --yellow:     #dcdcaa;
  --orange:     #ce9178;
  --text-1:     #d4d4d4;
  --text-2:     #9cdcfe;
  --text-3:     #6a6a6a;
  --text-code:  #4ec9b0;
  --scrollbar:  #3e3e42;
  --overlay:    rgba(30,30,30,0.9);
  --grid-line:  rgba(86,156,214,0.03);
  --scan-line:  transparent;
  --glow-strong: 0 0 12px rgba(86,156,214,0.2);
  --tag-bg:     rgba(86,156,214,0.08);
  --tag-border: rgba(86,156,214,0.2);
}

/* ═══════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { font-size: 14px; }

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-1);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--accent-dim); }

/* Void theme grid & scanlines */
[data-theme="void"] body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none; z-index:0;
}
[data-theme="void"] body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan-line) 2px, var(--scan-line) 4px);
  pointer-events:none; z-index:0;
}

/* ═══════════════════════════════════════════════════════════
   HUD DECORATORS
   ═══════════════════════════════════════════════════════════ */
.hud-box {
  position:relative;
  border:1px solid var(--border);
  border-radius:var(--r-md);
  background:var(--bg-card);
}
.hud-box::before, .hud-box::after {
  content:'';
  position:absolute;
  width:9px; height:9px;
  border-color:var(--accent);
  border-style:solid;
}
.hud-box::before { top:-1px; left:-1px; border-width:1.5px 0 0 1.5px; border-radius:var(--r-sm) 0 0 0; }
.hud-box::after  { bottom:-1px; right:-1px; border-width:0 1.5px 1.5px 0; border-radius:0 0 var(--r-sm) 0; }

/* ═══════════════════════════════════════════════════════════
   LOGIN SCREEN
   ═══════════════════════════════════════════════════════════ */
.login-screen {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:200; background:var(--bg-base);
}
.login-ring {
  position:absolute; border-radius:50%;
  border:1px solid var(--accent-glow);
  animation:expandRing 4s ease-in-out infinite;
}
@keyframes expandRing { 0%{transform:scale(0.8);opacity:0.6} 100%{transform:scale(1.6);opacity:0} }

.login-card {
  position:relative; width:400px; padding:44px 38px;
  background:var(--bg-layer2);
  border:1px solid rgba(0,229,255,0.18);
  border-radius:var(--r-xl);
  box-shadow: 0 0 40px rgba(0,229,255,0.05), 0 24px 48px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
  z-index:1;
}
[data-theme="standard"] .login-card { box-shadow: 0 4px 24px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06); border-color:var(--border); }
[data-theme="system"] .login-card { border-color:var(--border); }

.login-card::before, .login-card::after {
  content:''; position:absolute;
  width:14px; height:14px;
  border-color:var(--accent); border-style:solid;
}
.login-card::before { top:-1px; left:-1px; border-width:2px 0 0 2px; border-radius:var(--r-sm) 0 0 0; }
.login-card::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-radius:0 0 var(--r-sm) 0; }

.login-logo { text-align:center; margin-bottom:32px; }
.login-mark {
  width:60px; height:60px; margin:0 auto 14px;
  background:radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  border:1px solid var(--border-glow);
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-hud); font-size:24px; font-weight:900;
  color:var(--accent); position:relative; overflow:hidden;
}
[data-theme="void"] .login-mark { text-shadow: 0 0 20px var(--accent); }
.login-logo h1 {
  font-family:var(--font-hud); font-size:22px; font-weight:700;
  letter-spacing:4px; color:var(--accent); text-transform:uppercase;
}
[data-theme="void"] .login-logo h1 { text-shadow: 0 0 20px rgba(0,229,255,0.4); }
.login-logo p { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--text-3); margin-top:4px; }

.login-divider { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin-bottom:24px; }

.login-label { display:block; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-3); margin-bottom:6px; font-family:var(--font-hud); }

.login-input {
  width:100%; background:var(--bg-input); border:1px solid var(--border);
  border-radius:var(--r-md); padding:11px 14px;
  color:var(--text-1); font-family:var(--font-mono); font-size:15px;
  outline:none; transition:all var(--transition); letter-spacing:1px;
  margin-bottom:16px;
}
.login-input:focus { border-color:var(--accent-dim); box-shadow:0 0 0 2px var(--accent-glow); }
.login-input::placeholder { color:var(--text-3); letter-spacing:0; font-family:var(--font-body); }

.login-btn {
  width:100%; padding:13px; background:transparent;
  border:1px solid var(--accent-dim); border-radius:var(--r-md);
  color:var(--accent); font-family:var(--font-hud); font-size:13px;
  font-weight:700; letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
}
.login-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, var(--accent-glow) 0%, transparent 100%); opacity:0; transition:opacity 0.25s; }
.login-btn:hover::before { opacity:1; }
.login-btn:hover { box-shadow:var(--glow-strong); }
.login-btn:disabled { opacity:0.4; cursor:not-allowed; }

.login-status { margin-top:10px; text-align:center; font-size:13px; font-family:var(--font-mono); letter-spacing:1px; min-height:16px; }
.login-status.error { color:var(--red); }
.login-status.ok    { color:var(--accent); }

/* Theme picker on login */
.theme-picker-login { display:flex; gap:6px; justify-content:center; margin-top:20px; }
.tp-btn {
  padding:5px 10px; border-radius:20px; font-size:11px; letter-spacing:1.5px;
  text-transform:uppercase; font-family:var(--font-hud); cursor:pointer;
  border:1px solid var(--border); background:transparent; color:var(--text-3);
  transition:all var(--transition);
}
.tp-btn.active, .tp-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }

/* ═══════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════ */
.app { display:flex; min-height:100vh; position:relative; z-index:1; }

/* ── SIDEBAR ── */
.sidebar {
  position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w);
  background:var(--bg-layer1); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:50; overflow:hidden;
  transition:background var(--transition);
}
[data-theme="void"] .sidebar::after {
  content:''; position:absolute; top:0; right:0; width:1px; height:100%;
  background:linear-gradient(180deg, transparent, var(--accent-dim), transparent);
  opacity:0.25;
}

.sb-logo { padding:18px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.sb-mark {
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  background:radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  border:1px solid var(--border-glow);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-hud); font-size:14px; font-weight:900; color:var(--accent);
}
[data-theme="void"] .sb-mark { text-shadow:0 0 10px var(--accent); }
.sb-title { font-family:var(--font-hud); font-size:14px; font-weight:700; letter-spacing:2px; color:var(--accent); }
[data-theme="void"] .sb-title { text-shadow:0 0 10px rgba(0,229,255,0.3); }
.sb-subtitle { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-3); margin-top:1px; }

.sb-section { padding:12px 16px 4px; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--text-2); font-family:var(--font-hud); }

.nav-item {
  display:flex; align-items:center; gap:9px;
  padding:9px 16px; cursor:pointer; color:var(--text-2);
  transition:all var(--transition); font-size:15px;
  position:relative; border-left:2px solid transparent;
}
.nav-item:hover { color:var(--text-1); background:var(--accent-glow2); }
.nav-item.active { color:var(--accent); background:var(--accent-glow2); border-left-color:var(--accent); }
.nav-item .nav-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
.nav-item .nav-badge {
  margin-left:auto; background:var(--red); color:#fff;
  font-size:11px; font-weight:700; font-family:var(--font-hud);
  padding:1px 5px; border-radius:10px; min-width:16px; text-align:center;
}
.nav-item.active .nav-badge { background:var(--accent); color:var(--bg-base); }

/* Token counter mini in sidebar */
.token-sidebar {
  margin:6px 12px;
  padding:10px 12px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  font-size:12px;
}
.token-sidebar-title { font-family:var(--font-hud); font-size:12px; letter-spacing:2px; color:var(--text-2); text-transform:uppercase; margin-bottom:8px; }
.token-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.token-label { color:var(--text-1); font-size:13px; }
.token-value { font-family:var(--font-mono); font-size:13px; color:var(--accent); }
.token-bar { height:2px; background:var(--border); border-radius:1px; margin-top:2px; margin-bottom:6px; overflow:hidden; }
.token-bar-fill { height:100%; border-radius:1px; transition:width 0.6s ease; }
.token-gemini   { background:#4285f4; }
.token-claude   { background:var(--accent); }
.token-qwen     { background:#7c3aed; }

.sb-footer { margin-top:auto; padding:12px 14px; border-top:1px solid var(--border); }
.user-chip { display:flex; align-items:center; gap:8px; }
.user-avatar {
  width:30px; height:30px; border-radius:8px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-hud); font-size:12px; font-weight:700; color:#fff;
}
.user-name { font-size:11.5px; font-weight:600; color:var(--text-1); }
.user-role { font-size:11px; color:var(--text-3); font-family:var(--font-mono); }
.btn-logout {
  margin-top:8px; width:100%; padding:6px;
  background:transparent; border:1px solid var(--border);
  border-radius:var(--r-sm); color:var(--text-3);
  font-size:11px; font-family:var(--font-hud); letter-spacing:1.5px;
  cursor:pointer; transition:all var(--transition);
}
.btn-logout:hover { border-color:var(--red); color:var(--red); }

/* ── MAIN ── */
.main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

.topbar {
  height:var(--header-h); padding:0 24px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background:var(--overlay); backdrop-filter:blur(10px);
  position:sticky; top:0; z-index:40; flex-shrink:0;
  transition:background var(--transition);
}
.topbar-title { font-family:var(--font-hud); font-size:13px; font-weight:500; letter-spacing:3px; text-transform:uppercase; color:var(--accent); }
.topbar-right { display:flex; align-items:center; gap:14px; }
.topbar-status { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-3); }
.status-dot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.topbar-clock { font-family:var(--font-mono); font-size:12px; color:var(--text-3); }

/* Theme switcher topbar */
.theme-switcher { display:flex; gap:4px; align-items:center; }
.ts-btn {
  width:22px; height:22px; border-radius:6px; cursor:pointer;
  border:1px solid var(--border); background:var(--bg-input);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; transition:all var(--transition); color:var(--text-3);
}
.ts-btn:hover, .ts-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }

/* Notification bell */
.notif-btn {
  position:relative; width:28px; height:28px; border-radius:var(--r-md);
  background:transparent; border:1px solid var(--border);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--text-3); font-size:15px; transition:all var(--transition);
}
.notif-btn:hover { border-color:var(--accent); color:var(--accent); }
.notif-badge {
  position:absolute; top:-4px; right:-4px;
  background:var(--red); color:#fff;
  font-size:11px; font-weight:700; font-family:var(--font-hud);
  padding:0 4px; border-radius:8px; min-width:14px; text-align:center;
}

/* ── CONTENT ── */
.page { flex:1; padding:22px 24px; overflow-y:auto; }

/* ═══════════════════════════════════════════════════════════
   COMMON COMPONENTS
   ═══════════════════════════════════════════════════════════ */
.page-header { margin-bottom:20px; }
.page-header h2 { font-family:var(--font-hud); font-size:14px; font-weight:700; letter-spacing:2px; color:var(--text-1); text-transform:uppercase; }
.page-header p  { font-size:14px; color:var(--text-3); margin-top:4px; }

.section-label { font-family:var(--font-hud); font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; }

.card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:18px 20px;
  transition:background var(--transition), border var(--transition);
}
.card:hover { border-color:var(--accent-glow); }

.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:var(--r-md); font-size:13px;
  font-family:var(--font-hud); letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer; transition:all var(--transition); border:1px solid transparent;
}
.btn-primary { background:var(--accent); color:var(--bg-base); border-color:var(--accent); }
.btn-primary:hover { opacity:0.85; }
.btn-ghost { background:transparent; border-color:var(--border); color:var(--text-2); }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }
.btn-danger { background:transparent; border-color:var(--red); color:var(--red); }
.btn-danger:hover { background:rgba(255,61,90,0.1); }
.btn-sm { padding:5px 10px; font-size:12px; }

.badge {
  display:inline-flex; align-items:center;
  padding:2px 7px; border-radius:10px; font-size:11px;
  font-family:var(--font-hud); letter-spacing:1px; text-transform:uppercase;
  background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--accent);
}
.badge-green  { background:rgba(0,255,157,0.08); border-color:rgba(0,255,157,0.2); color:var(--green); }
[data-theme="standard"] .badge-green { background:rgba(22,163,74,0.08); border-color:rgba(22,163,74,0.2); }
[data-theme="system"] .badge-green { background:rgba(78,201,176,0.08); border-color:rgba(78,201,176,0.2); }
.badge-red    { background:rgba(255,61,90,0.08); border-color:rgba(255,61,90,0.2); color:var(--red); }
.badge-yellow { background:rgba(255,214,10,0.08); border-color:rgba(255,214,10,0.2); color:var(--yellow); }
[data-theme="standard"] .badge-yellow { color:var(--yellow); }
.badge-purple { background:rgba(124,58,237,0.1); border-color:rgba(124,58,237,0.25); color:var(--accent2); }

input, textarea, select {
  width:100%; background:var(--bg-input); border:1px solid var(--border);
  border-radius:var(--r-md); padding:10px 13px;
  color:var(--text-1); font-family:var(--font-body); font-size:15px;
  outline:none; transition:all var(--transition);
}
input:focus, textarea:focus, select:focus { border-color:var(--accent-dim); box-shadow:0 0 0 2px var(--accent-glow); }
input::placeholder, textarea::placeholder { color:var(--text-3); }

/* Separator */
.sep { height:1px; background:var(--border); margin:16px 0; }

/* ═══════════════════════════════════════════════════════════
   DASHBOARD
   ═══════════════════════════════════════════════════════════ */
.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.kpi-card {
  padding:16px 18px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-lg); position:relative; overflow:hidden; cursor:default;
  transition:all var(--transition);
}
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.kpi-card.c-cyan::before   { background:linear-gradient(90deg, var(--accent), transparent); }
.kpi-card.c-green::before  { background:linear-gradient(90deg, var(--green), transparent); }
.kpi-card.c-purple::before { background:linear-gradient(90deg, var(--accent2), transparent); }
.kpi-card.c-orange::before { background:linear-gradient(90deg, var(--orange), transparent); }
.kpi-card:hover { border-color:var(--accent-glow); transform:translateY(-1px); }
.kpi-lbl { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--text-3); font-family:var(--font-hud); margin-bottom:10px; }
.kpi-val { font-family:var(--font-hud); font-size:24px; font-weight:700; color:var(--text-1); margin-bottom:4px; }
.kpi-sub { font-size:12px; }
.kpi-sub.pos { color:var(--green); }
.kpi-sub.neg { color:var(--red); }
.kpi-sub.neu { color:var(--text-3); }
.kpi-icon { position:absolute; right:16px; top:16px; font-size:22px; opacity:0.15; }

.dash-grid { display:grid; grid-template-columns:2fr 1fr; gap:14px; margin-bottom:14px; }
.dash-grid-full { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.alerts-list { display:flex; flex-direction:column; gap:6px; }
.alert-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:var(--r-md);
  border:1px solid; font-size:14px;
}
.alert-item.critical { background:rgba(255,61,90,0.06); border-color:rgba(255,61,90,0.2); }
.alert-item.warning  { background:rgba(255,214,10,0.06); border-color:rgba(255,214,10,0.2); }
.alert-item.info     { background:var(--accent-glow2); border-color:var(--tag-border); }
.alert-icon { font-size:14px; margin-top:1px; flex-shrink:0; }
.alert-text { color:var(--text-1); }
.alert-meta { font-size:12px; color:var(--text-3); font-family:var(--font-mono); margin-top:2px; }

.approval-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 13px; background:var(--bg-layer2);
  border:1px solid var(--border); border-radius:var(--r-md);
  margin-bottom:6px; font-size:14px; cursor:pointer;
  transition:all var(--transition);
}
.approval-item:hover { border-color:var(--accent-glow); background:var(--accent-glow2); }
.approval-icon { font-size:18px; flex-shrink:0; }
.approval-info { flex:1; min-width:0; }
.approval-title { font-weight:600; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.approval-sub { font-size:12px; color:var(--text-3); font-family:var(--font-mono); }
.approval-countdown { font-family:var(--font-mono); font-size:12px; color:var(--yellow); flex-shrink:0; }

/* Token usage dashboard card */
.token-usage-card { padding:18px 20px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); }
.token-model-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.token-model-row:last-child { margin-bottom:0; }
.token-model-name { font-family:var(--font-hud); font-size:11px; letter-spacing:1px; color:var(--text-2); width:70px; flex-shrink:0; }
.token-model-bar { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.token-model-fill { height:100%; border-radius:3px; transition:width 0.8s ease; }
.token-model-count { font-family:var(--font-mono); font-size:11px; color:var(--text-3); width:65px; text-align:right; flex-shrink:0; }
.token-model-cost  { font-family:var(--font-mono); font-size:11px; color:var(--text-2); width:48px; text-align:right; flex-shrink:0; }

/* Budget bar */
.budget-bar-wrap { margin-top:8px; }
.budget-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.budget-bar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width 0.8s ease; }
.budget-labels { display:flex; justify-content:space-between; font-size:11px; font-family:var(--font-mono); color:var(--text-3); margin-top:4px; }

/* ═══════════════════════════════════════════════════════════
   CHAT
   ═══════════════════════════════════════════════════════════ */
.chat-layout { display:flex; gap:0; height:calc(100vh - var(--header-h) - 44px); }
.chat-main { flex:1; display:flex; flex-direction:column; min-width:0; }

.chat-messages {
  flex:1; overflow-y:auto; padding:16px 4px 16px 0;
  display:flex; flex-direction:column; gap:12px;
}
.msg-row { display:flex; gap:8px; animation:msgIn 0.25s ease-out; }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg-row.user { flex-direction:row-reverse; }
.msg-avatar {
  width:28px; height:28px; border-radius:7px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-family:var(--font-hud); font-weight:700; margin-top:2px;
}
.msg-avatar.ada  { background:radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); border:1px solid var(--border-glow); color:var(--accent); }
.msg-avatar.user { background:linear-gradient(135deg, var(--accent2), #9333ea); color:#fff; }
.msg-body { max-width:70%; }
.msg-meta { font-size:11px; color:var(--text-3); font-family:var(--font-mono); margin-bottom:3px; letter-spacing:0.5px; display:flex; gap:8px; align-items:center; }
.msg-meta.ada { color:var(--accent-dim); }
.msg-bubble {
  padding:10px 14px; border-radius:10px; font-size:15px; line-height:1.6;
  word-wrap:break-word; position:relative;
}
.msg-bubble.ada {
  background:var(--bg-card); border:1px solid var(--border);
  border-bottom-left-radius:3px; color:var(--text-1);
}
.msg-bubble.ada::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--accent); border-radius:2px 0 0 2px; opacity:0.6;
}
.msg-bubble.user {
  background:var(--bg-layer2); border:1px solid var(--border);
  border-bottom-right-radius:3px; color:var(--text-1);
}
/* Markdown in messages */
.msg-bubble strong { color:var(--accent); font-weight:600; }
.msg-bubble em { color:var(--text-2); font-style:italic; }
.msg-bubble code {
  background:var(--tag-bg); border:1px solid var(--tag-border);
  border-radius:3px; padding:1px 5px;
  font-family:var(--font-mono); font-size:13px; color:var(--text-code);
}
.msg-bubble ul { padding-left:16px; }
.msg-bubble li { margin:2px 0; }
.msg-bubble table { border-collapse:collapse; width:100%; font-size:13px; margin-top:6px; }
.msg-bubble th { padding:5px 8px; text-align:left; font-family:var(--font-hud); font-size:11px; letter-spacing:1px; background:var(--bg-layer2); border:1px solid var(--border); color:var(--text-3); }
.msg-bubble td { padding:5px 8px; border:1px solid var(--border); }
.msg-bubble h3 { font-family:var(--font-hud); font-size:13px; letter-spacing:1.5px; color:var(--accent); margin:8px 0 4px; text-transform:uppercase; }

.typing { display:flex; gap:4px; padding:10px 14px; background:var(--bg-card); border:1px solid var(--border); border-bottom-left-radius:3px; border-radius:10px; align-self:flex-start; width:fit-content; }
.typing-dot { width:5px; height:5px; border-radius:50%; background:var(--accent-dim); animation:bounce 1.4s infinite; }
.typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-4px);opacity:1} }

.chat-input-bar { padding:14px 0 0; border-top:1px solid var(--border); flex-shrink:0; }
.chat-file-preview {
  display:flex; align-items:center; gap:8px;
  padding:7px 12px; margin-bottom:6px;
  background:var(--accent-glow2); border:1px solid var(--tag-border);
  border-radius:var(--r-md); font-size:13px; color:var(--accent); font-family:var(--font-mono);
}
.chat-file-preview span { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chat-file-rm { background:none; border:none; cursor:pointer; color:var(--red); font-size:14px; padding:0 3px; }
.chat-input-row {
  display:flex; align-items:center; gap:8px;
  background:var(--bg-input); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:5px 5px 5px 14px;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.chat-input-row:focus-within { border-color:rgba(0,229,255,0.4); box-shadow:0 0 0 2px var(--accent-glow); }
[data-theme="standard"] .chat-input-row:focus-within { border-color:rgba(0,102,230,0.4); box-shadow:0 0 0 2px rgba(0,102,230,0.12); }
.chat-input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text-1); font-family:var(--font-body); font-size:15px; padding:6px 0;
}
.chat-input::placeholder { color:var(--text-3); }
.chat-actions { display:flex; gap:5px; align-items:center; }
.icon-btn {
  width:34px; height:34px; border-radius:var(--r-md);
  background:transparent; border:1px solid var(--border);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--text-3); font-size:14px; transition:all var(--transition);
}
.icon-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }
.icon-btn.primary { background:var(--accent); border-color:var(--accent); color:var(--bg-base); }
.icon-btn.primary:hover { opacity:0.85; transform:scale(1.04); }
.icon-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none!important; }

/* Chat suggestions */
.chat-suggestions { display:flex; gap:6px; flex-wrap:wrap; padding-bottom:10px; }
.chat-suggestion {
  padding:6px 12px; border-radius:20px; font-size:13px;
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-2); cursor:pointer; transition:all var(--transition);
}
.chat-suggestion:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }

/* Intent + model tags */
.msg-tags { display:flex; gap:5px; margin-top:6px; flex-wrap:wrap; }

/* ═══════════════════════════════════════════════════════════
   VAULT (REPORTS)
   ═══════════════════════════════════════════════════════════ */
.vault-toolbar {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
}
.vault-search {
  flex:1; position:relative;
}
.vault-search input { padding-left:34px; }
.vault-search .search-icon {
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  color:var(--text-3); font-size:15px; pointer-events:none;
}
.filter-chip {
  padding:6px 12px; border-radius:20px; font-size:12px;
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-2); cursor:pointer; transition:all var(--transition);
  font-family:var(--font-hud); letter-spacing:1px; text-transform:uppercase; white-space:nowrap;
}
.filter-chip.active { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }

.report-card {
  padding:14px 16px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-lg); cursor:pointer; transition:all var(--transition);
  margin-bottom:8px; display:flex; gap:14px; align-items:flex-start;
}
.report-card:hover { border-color:var(--accent-glow); background:var(--accent-glow2); transform:translateX(2px); }
.report-type-icon {
  width:36px; height:36px; border-radius:var(--r-md); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:17px;
  background:var(--bg-layer2); border:1px solid var(--border);
}
.report-info { flex:1; min-width:0; }
.report-title { font-weight:600; color:var(--text-1); font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.report-meta { font-size:12px; color:var(--text-3); font-family:var(--font-mono); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
.report-meta span { display:flex; align-items:center; gap:3px; }
.report-actions { display:flex; gap:5px; align-items:center; flex-shrink:0; }
.report-alert-dot { width:7px; height:7px; border-radius:50%; }
.report-alert-dot.critical { background:var(--red); box-shadow:0 0 6px var(--red); }
.report-alert-dot.warning  { background:var(--yellow); }
.report-alert-dot.none     { background:var(--green); }

/* Report detail */
.report-detail-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.back-btn { background:none; border:none; cursor:pointer; color:var(--text-3); font-size:18px; transition:color var(--transition); padding:4px; }
.back-btn:hover { color:var(--accent); }
.report-detail-title { flex:1; font-family:var(--font-hud); font-size:15px; font-weight:700; letter-spacing:1.5px; color:var(--text-1); text-transform:uppercase; }
.markdown-body { font-size:15px; line-height:1.7; color:var(--text-1); }
.markdown-body h2 { font-family:var(--font-hud); font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin:16px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.markdown-body h3 { font-size:14px; font-weight:600; color:var(--text-1); margin:12px 0 6px; }
.markdown-body p  { margin:6px 0; }
.markdown-body ul { padding-left:18px; margin:6px 0; }
.markdown-body li { margin:3px 0; }
.markdown-body table { border-collapse:collapse; width:100%; margin:10px 0; font-size:11.5px; }
.markdown-body th { padding:7px 10px; text-align:left; font-family:var(--font-hud); font-size:11px; letter-spacing:1px; background:var(--bg-layer2); border:1px solid var(--border); color:var(--text-3); text-transform:uppercase; }
.markdown-body td { padding:6px 10px; border:1px solid var(--border); color:var(--text-1); }
.markdown-body tr:hover td { background:var(--accent-glow2); }
.markdown-body code { background:var(--tag-bg); border:1px solid var(--tag-border); border-radius:3px; padding:1px 6px; font-family:var(--font-mono); font-size:13px; color:var(--text-code); }
.markdown-body blockquote { margin:8px 0; padding:8px 14px; border-left:3px solid var(--accent); background:var(--accent-glow2); color:var(--text-2); border-radius:0 var(--r-md) var(--r-md) 0; }
.alert-box { padding:10px 13px; border-radius:var(--r-md); margin:6px 0; font-size:14px; display:flex; gap:8px; border:1px solid; }
.alert-box.critical { background:rgba(255,61,90,0.07); border-color:rgba(255,61,90,0.25); color:var(--text-1); }
.alert-box.warning  { background:rgba(255,214,10,0.06); border-color:rgba(255,214,10,0.25); color:var(--text-1); }
.alert-box.info     { background:var(--accent-glow2); border-color:var(--tag-border); color:var(--text-1); }

/* Related reports */
.related-report { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--r-md); border:1px solid var(--border); margin-bottom:4px; cursor:pointer; transition:all var(--transition); font-size:14px; }
.related-report:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow2); }
.related-link-type { font-family:var(--font-hud); font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); margin-left:auto; }

/* Tag chips */
.tag-chip {
  display:inline-block; padding:2px 7px; border-radius:20px;
  font-size:11px; font-family:var(--font-hud); letter-spacing:0.8px;
  text-transform:uppercase; cursor:pointer; transition:all var(--transition);
  background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--accent);
}
.tag-chip:hover { background:var(--accent-glow); border-color:var(--accent); }
.tag-chip.active { background:var(--accent); color:var(--bg-base); border-color:var(--accent); }
.tags-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }

/* Graph mini */
.graph-section { margin-top:14px; }
.graph-empty { text-align:center; padding:32px; color:var(--text-3); font-size:14px; }
.graph-node-label { font-size:7px; line-height:1.2; text-align:center; max-width:44px; overflow:hidden; word-break:break-word; }

/* ═══════════════════════════════════════════════════════════
   APPROVALS
   ═══════════════════════════════════════════════════════════ */
.approval-full-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-lg); margin-bottom:10px; overflow:hidden;
  transition:all var(--transition);
}
.approval-full-card:hover { border-color:var(--accent-glow); }
.approval-card-header {
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  cursor:pointer;
}
.approval-card-body { padding:0 16px 14px; border-top:1px solid var(--border); }
.approval-preview {
  background:var(--bg-layer2); border:1px solid var(--border); border-radius:var(--r-md);
  padding:12px 14px; font-size:14px; font-family:var(--font-mono); color:var(--text-2);
  margin:10px 0; max-height:120px; overflow-y:auto; line-height:1.6;
}
.approval-btns { display:flex; gap:8px; }
.countdown-chip { display:flex; align-items:center; gap:4px; font-size:12px; font-family:var(--font-mono); }
.countdown-chip .dot { width:5px; height:5px; border-radius:50%; }
.countdown-chip.urgent { color:var(--red); }
.countdown-chip.urgent .dot { background:var(--red); animation:blink 1s ease-in-out infinite; }
.countdown-chip.normal { color:var(--yellow); }
.countdown-chip.normal .dot { background:var(--yellow); }

/* ═══════════════════════════════════════════════════════════
   SETTINGS
   ═══════════════════════════════════════════════════════════ */
.settings-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px; }
.settings-tab {
  padding:10px 18px; font-size:13px; font-family:var(--font-hud); letter-spacing:1.5px;
  text-transform:uppercase; cursor:pointer; color:var(--text-3);
  border-bottom:2px solid transparent; transition:all var(--transition);
  background:none; border-left:none; border-right:none; border-top:none;
}
.settings-tab:hover { color:var(--text-1); }
.settings-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-3); font-family:var(--font-hud); margin-bottom:6px; }

.team-member-row {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-md);
  margin-bottom:6px; transition:all var(--transition);
}
.team-member-row:hover { border-color:var(--accent-glow); }
.tm-avatar { width:32px; height:32px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-hud); font-size:14px; font-weight:700; color:#fff; }
.tm-info { flex:1; }
.tm-name { font-weight:600; font-size:15px; color:var(--text-1); }
.tm-role { font-size:12px; color:var(--text-3); font-family:var(--font-mono); }
.permissions-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.perm-toggle {
  display:flex; align-items:center; gap:8px; padding:8px 10px;
  background:var(--bg-layer2); border:1px solid var(--border);
  border-radius:var(--r-md); cursor:pointer; transition:all var(--transition);
  font-size:13px; color:var(--text-2);
}
.perm-toggle.on { border-color:var(--accent-glow); color:var(--accent); background:var(--accent-glow2); }
.perm-toggle:hover { border-color:var(--accent-glow); }
.perm-dot { width:8px; height:8px; border-radius:50%; background:var(--border); flex-shrink:0; }
.perm-toggle.on .perm-dot { background:var(--accent); box-shadow:0 0 6px var(--accent); }

/* ═══════════════════════════════════════════════════════════
   TOKEN MONITOR (full page)
   ═══════════════════════════════════════════════════════════ */
.token-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
.token-model-card {

function fmtTokens(n) {
  if (n >= 1000000) return (n/1000000).toFixed(2)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function parseMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(.+)$/gm, (line) => {
      if (line.startsWith('<')) return line;
      return line;
    });
}

function renderMarkdown(md) {
  const lines = md.split('\n');
  const html = [];
  let inTable = false, tableRows = [], inList = false, listItems = [];

  const flushList = () => {
    if (listItems.length) { html.push(`<ul>${listItems.map(l=>`<li>${l}</li>`).join('')}</ul>`); listItems=[]; inList=false; }
  };
  const flushTable = () => {
    if (tableRows.length) {
      const head = tableRows[0]; const body = tableRows.slice(2);
      const th = head.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      const tb = body.map(r => `<tr>${r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('')}</tr>`).join('');
      html.push(`<table><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`);
      tableRows=[]; inTable=false;
    }
  };

  for (const line of lines) {
    if (line.startsWith('## ')) { flushList(); flushTable(); html.push(`<h2>${line.slice(3)}</h2>`); continue; }
    if (line.startsWith('### ')) { flushList(); flushTable(); html.push(`<h3>${line.slice(4)}</h3>`); continue; }
    if (line.startsWith('> ')) { flushList(); flushTable(); html.push(`<blockquote>${formatInline(line.slice(2))}</blockquote>`); continue; }
    if (line.startsWith('- ') || line.startsWith('* ')) { flushTable(); inList=true; listItems.push(formatInline(line.slice(2))); continue; }
    if (line.startsWith('|')) { flushList(); inTable=true; tableRows.push(line); continue; }
    if (inTable && !line.startsWith('|')) { flushTable(); }
    if (inList && !line.startsWith('- ') && !line.startsWith('* ')) { flushList(); }
    if (line.trim()==='') { flushList(); flushTable(); html.push('<br>'); continue; }
    if (!inTable) html.push(`<p>${formatInline(line)}</p>`);
  }
  flushList(); flushTable();
  return html.join('');
}

function formatInline(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}

// ─── KNOWLEDGE GRAPH MINI ─────────────────────────────────────────
function KnowledgeGraphMini({ links, onNav }) {
  const svgRef = useRef(null);
  if (!links || links.length === 0) {
    return (
      <div className="graph-canvas">
        <div className="graph-empty">
          <div style={{fontSize:'28px',marginBottom:'8px',opacity:0.3}}>🕸️</div>
          <div style={{fontFamily:'var(--font-hud)',fontSize:'11px',letterSpacing:'2px'}}>SIN VÍNCULOS AÚN</div>
          <div style={{fontSize:'12px',marginTop:'4px',color:'var(--text-3)'}}>Los links aparecen al subir más reportes</div>
        </div>
      </div>
    );
  }

  const W = 520, H = 200, CX = W/2, CY = H/2;
  const count = Math.min(links.length, 7);
  const nodes = links.slice(0, count).map((l, i) => {
    const angle = (2 * Math.PI * i) / count - Math.PI/2;
    const r = 72;
    return {
      id: l.id,
      title: l.title || l.source_file || 'Reporte',
      linkType: l.link_type || 'related',
      x: CX + r * Math.cos(angle),
      y: CY + r * Math.sin(angle),
    };
  });

  const linkColor = (lt) => {
    if (!lt) return 'var(--border)';
    if (lt.includes('updates')) return 'var(--green)';
    if (lt.includes('contradicts')) return 'var(--red)';
    if (lt.includes('extends')) return 'var(--accent)';
    if (lt.includes('mentions')) return 'var(--accent2)';
    return 'var(--border)';
  };

  return (
    <div className="graph-canvas" style={{height:'200px',overflow:'hidden'}}>
      <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{position:'absolute',inset:0}}>
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {/* Lines from center to nodes */}
        {nodes.map(n => (
          <line key={n.id+'-line'}
            x1={CX} y1={CY} x2={n.x} y2={n.y}
            stroke={linkColor(n.linkType)} strokeWidth="1"
            strokeDasharray="3 3" opacity="0.6"
          />
        ))}
        {/* Satellite nodes */}
        {nodes.map(n => (
          <g key={n.id} style={{cursor:'pointer'}} onClick={()=>onNav&&onNav('report',n.id)}>
            <circle cx={n.x} cy={n.y} r="14" fill="var(--bg-card)" stroke={linkColor(n.linkType)} strokeWidth="1.5" opacity="0.9"/>
            <text x={n.x} y={n.y+24} textAnchor="middle" fill="var(--text-3)" fontSize="6" fontFamily="var(--font-hud)">
              {(n.title||'').slice(0,14)}
            </text>
            <text x={n.x} y={n.y+3} textAnchor="middle" fill={linkColor(n.linkType)} fontSize="9">🔗</text>
          </g>
        ))}
        {/* Center node */}
        <circle cx={CX} cy={CY} r="20" fill="var(--bg-card)" stroke="var(--accent)" strokeWidth="2" filter="url(#glow)"/>
        <text x={CX} y={CY+4} textAnchor="middle" fill="var(--accent)" fontSize="12" fontFamily="var(--font-hud)">📊</text>
      </svg>
      {/* Legend */}
      <div style={{position:'absolute',bottom:'6px',right:'8px',display:'flex',gap:'8px',fontSize:'8px',fontFamily:'var(--font-hud)',color:'var(--text-3)'}}>
        {[['extends','var(--accent)'],['updates','var(--green)'],['related','var(--border)']].map(([l,c])=>(
          <span key={l} style={{display:'flex',alignItems:'center',gap:'3px'}}>
            <span style={{width:'8px',height:'1px',background:c,display:'inline-block'}}/>
            {l}
          </span>
        ))}
      </div>
    </div>
  );
}

    return { text:`Procesando: *"${msg}"*\n\nConectando con Ada...`, intent:"conversational", model:"gemini" };
  };

  const getFileIcon = (f) => {
    if (!f) return '📎';
    const name = f.name.toLowerCase();
    if (name.endsWith('.pdf')) return '📄';
    if (['.png','.jpg','.jpeg','.webp','.gif'].some(e=>name.endsWith(e))) return '🖼️';
    if (['.xlsx','.xls'].some(e=>name.endsWith(e))) return '📊';
    if (['.doc','.docx'].some(e=>name.endsWith(e))) return '📝';
    if (name.endsWith('.csv')) return '📋';
    if (name.endsWith('.txt')) return '📃';
    return '📎';
  };

  const imageMenuOptions = {'1':'Analizar documento / factura / contrato','2':'Interpretar gráfica o métricas','3':'Evaluar como pieza de marketing','4':'Etiquetar persona o equipo','5':'Describir producto','6':'Análisis general'};
  const pendingImageRef = useRef(null);
  const awaitingPersonInfoRef = useRef(false);

  const _uploadPendingImage = async (instruction) => {
    const pendingFile = pendingImageRef.current;
    pendingImageRef.current = null;
    awaitingPersonInfoRef.current = false;
    setLoading(true);
    try {
      const fd = new FormData();
      fd.append('file', pendingFile);
      fd.append('empresa_id', MOCK_USER.empresa_id);
      fd.append('instruction', instruction);
      fd.append('industry_type', 'generic');
      const uploadResp = await fetch(`${API_URL}/files/upload`, { method:'POST', headers:{'Authorization':'Bearer '+(MOCK_USER.token||'')}, body:fd });
      if (uploadResp.ok) { const d=await uploadResp.json(); setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:d.response||'Análisis completado.',time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),intent:'excel_analysis',model:d.model_used||''}]); }
      else { setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:'Error analizando imagen.',time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}]); }
    } catch { setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:'Error de conexión.',time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}]); }
    setLoading(false);
  };

  const sendMessage = async (text = input) => {
    if (!text.trim() && !file) return;
    // Si estamos esperando info de persona (segundo nivel de opción 4)
    if (awaitingPersonInfoRef.current && pendingImageRef.current && !file && text.trim()) {
      const instruction = `Etiquetar persona: ${text.trim()}. Incluye nombre, cargo, área en el knowledge graph y en los metadatos del reporte.`;
      const userMsg = { id:Date.now(), from:'user', text:text.trim(), time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
      setMessages(prev=>[...prev,userMsg]);
      setInput('');
      await _uploadPendingImage(instruction);
      return;
    }
    // Si hay imagen pendiente y el usuario responde con opción del menú
    if (pendingImageRef.current && !file && text.trim()) {
      const choice = text.trim();
      // Opción 4: pedir nombre y cargo antes de procesar
      if (choice === '4') {
        awaitingPersonInfoRef.current = true;
        const userMsg = { id:Date.now(), from:'user', text:'Etiquetar persona o equipo', time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
        const askMsg = { id:Date.now()+1, from:'ada', text:'¿Cuál es el nombre completo de esta persona y su cargo o área?\n(Ej: Carlos Satizabal, Director de Educación)', time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
        setMessages(prev=>[...prev,userMsg,askMsg]);
        setInput('');
        return;
      }
      const instruction = imageMenuOptions[choice] || choice;
      const userMsg = { id:Date.now(), from:'user', text:instruction, time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
      setMessages(prev=>[...prev,userMsg]);
      setInput('');
      await _uploadPendingImage(instruction);
      return;
    }
    // Si se adjunta imagen sin texto, mostrar menú
    const isImageFile = file && file.type && file.type.startsWith('image/');
    if (isImageFile && !text.trim()) {
      pendingImageRef.current = file;
      const userMsg = { id:Date.now(), from:'user', text:`📷 ${file.name}`, time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
      const menuMsg = { id:Date.now()+1, from:'ada', text:'¿Qué quieres que haga con esta imagen?\n\n1️⃣ Analizar documento / factura / contrato\n2️⃣ Interpretar gráfica o métricas\n3️⃣ Evaluar como pieza de marketing\n4️⃣ Etiquetar persona o equipo\n5️⃣ Describir producto\n6️⃣ Análisis general\n\nResponde con el número o escribe tu propia instrucción.', time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
      setMessages(prev=>[...prev,userMsg,menuMsg]);
      setInput(''); setFile(null);
      return;
    }
    const fileIcon = getFileIcon(file);
    const userMsg = { id:Date.now(), from:'user', text:text||(file?`${fileIcon} ${file.name}`:''), time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) };
    setMessages(prev=>[...prev,userMsg]);
    const currentFile = file;
    const currentText = text;
    setInput(''); setFile(null); setLoading(true);
    try {
      // Si hay archivo, subirlo primero a /files/upload
      if (currentFile) {
        const fd = new FormData();
        fd.append('file', currentFile);
        fd.append('empresa_id', MOCK_USER.empresa_id);
        fd.append('instruction', currentText || 'Análisis general completo');
        fd.append('industry_type', 'generic');
        const uploadResp = await fetch(`${API_URL}/files/upload`, {
          method: 'POST',
          headers: {'Authorization': 'Bearer '+(MOCK_USER.token||'')},
          body: fd
        });
        if (uploadResp.ok) {
          const uploadData = await uploadResp.json();
          if (uploadData.error) {
            setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:`❌ Error: ${uploadData.error}`,time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}]);
          } else {
            const responseText = uploadData.response || '✅ Archivo analizado correctamente.';
            setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:responseText,time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),intent:'excel_analysis',model:uploadData.model_used||''}]);
          }
        } else {
          setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:'❌ Error subiendo archivo. Intenta de nuevo.',time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}]);
        }
      } else {
        // Solo texto, enviar a /chat/chat
        const resp = await fetch(`${API_URL}/chat/chat`, {
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+(MOCK_USER.token||'')},
          body:JSON.stringify({empresa_id:MOCK_USER.empresa_id,user_id:MOCK_USER.user_id,message:currentText})
        });
        if (resp.ok) {
          const data = await resp.json();
          setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',text:data.response||'Respuesta recibida.',time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}),intent:data.intent,model:data.model_used}]);
        } else { throw new Error(); }
      }
    } catch {
      await new Promise(r=>setTimeout(r,1200));
      const reply = buildReply(currentText);
      setMessages(prev=>[...prev,{id:Date.now()+1,from:'ada',...reply,time:new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}]);
    }
    setLoading(false);
  };

  const intentColor = (intent) => {
    const map = { data_query:'badge', calendar:'badge-green', email:'badge-purple', excel_analysis:'badge-yellow', conversational:'', routing:'badge-green' };
    return map[intent]||'badge';
  };
  const modelColor = (model) => {
    if (!model) return '';
    const m = model.toLowerCase();
    if (m.includes('gemini')) return 'badge-green';
    if (m.includes('opus')) return 'badge-yellow';
    if (m.includes('sonnet')) return '';
    return 'badge-purple';
  };

  return (
    <div className="chat-layout">
      <div className="chat-main">
        {!messages.length||messages.length<=1 ? (
          <div style={{padding:'20px 0 12px'}}>
            <div className="chat-suggestions">
              {SUGGESTIONS.map((s,i)=>(
                <button key={i} className="chat-suggestion" onClick={()=>sendMessage(s)}>{s}</button>
              ))}
            </div>
          </div>
        ) : null}

        <div className="chat-messages">
          {messages.map(m => (
            <div key={m.id} className={`msg-row ${m.from}`}>
              <div className={`msg-avatar ${m.from==='ada'?'ada':'user'}`}>
                {m.from==='ada'?'A':'W'}
              </div>
              <div className="msg-body">
                <div className={`msg-meta ${m.from==='ada'?'ada':''}`}>
                  {m.from==='ada'?'Ada':(MOCK_USER.name||'Usuario')} · {m.time}
                  {m.from==='ada' && m.intent && <span className={`badge ${intentColor(m.intent)}`} style={{fontSize:'8px',padding:'1px 5px'}}>{m.intent}</span>}
                  {m.from==='ada' && m.model && <span className={`badge ${modelColor(m.model)}`} style={{fontSize:'8px',padding:'1px 5px'}}>{m.model?.split('-').slice(0,2).join('-')}</span>}
                </div>
                <div className={`msg-bubble ${m.from==='ada'?'ada':'user'}`} dangerouslySetInnerHTML={{__html: renderMarkdown(m.text)}}/>
              </div>
            </div>
          ))}
          {loading && (
            <div className="msg-row">
              <div className="msg-avatar ada">A</div>
              <div className="typing"><div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/></div>
            </div>
          )}
          <div ref={msgEnd}/>
        </div>

        {messages.length<=1 && (
          <div className="chat-suggestions" style={{marginBottom:'10px'}}>
            {SUGGESTIONS.map((s,i)=>(
              <button key={i} className="chat-suggestion" onClick={()=>sendMessage(s)}>{s}</button>
            ))}
          </div>
        )}

        <div className="chat-input-bar">
          {file && (
            <div className="chat-file-preview">
              <span>📎 {file.name}</span>
              <button className="chat-file-rm" onClick={()=>setFile(null)}>×</button>
            </div>
          )}
          <div className="chat-input-row">
            <input type="file" ref={fileRef} style={{display:'none'}} accept=".xlsx,.xls,.csv,.pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp,.gif" onChange={e=>setFile(e.target.files[0])}/>
            <button className="icon-btn" title="Adjuntar archivo" onClick={()=>fileRef.current?.click()}>📎</button>
            <input
              className="chat-input"
              placeholder="Pregunta algo sobre tu negocio..."
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),sendMessage())}
            />
            <div className="chat-actions">
              <button className="icon-btn" title="Voz (próximamente)">🎤</button>
              <button className="icon-btn primary" disabled={loading||(!input.trim()&&!file)} onClick={()=>sendMessage()}>
                ➤
              </button>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',padding:'6px 2px 0',fontSize:'11px',color:'var(--text-3)',fontFamily:'var(--font-mono)'}}>
            <span>📎 Excel · CSV · PDF · Word · Imágenes · ⌨ Enter enviar</span>
            <span>Backend: backend-ada.duckdns.org</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── VAULT ────────────────────────────────────────────────────────
function Vault({ onNav }) {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [activeTag, setActiveTag] = useState('');
  const [reports, setReports] = useState([]);
  const [loadingReports, setLoadingReports] = useState(true);

  useEffect(() => {
    const fetchReports = async () => {
      setLoadingReports(true);
      try {
        // Si hay tag activo, usar endpoint de búsqueda por tag
        let url;
        if (activeTag) {
          url = `https://backend-ada.duckdns.org/api/v1/reports/by-tag?empresa_id=${MOCK_USER.empresa_id}&tag=${encodeURIComponent(activeTag)}`;
        } else if (search) {
          url = `https://backend-ada.duckdns.org/api/v1/reports/search/query?empresa_id=${MOCK_USER.empresa_id}&q=${encodeURIComponent(search)}`;
        } else {
          url = `https://backend-ada.duckdns.org/api/v1/reports?empresa_id=${MOCK_USER.empresa_id}&limit=20`;
        }
        const r = await fetch(url);
        if (r.ok) {
          const data = await r.json();
          const items = data.data || data.results || [];
          setReports(items.map(rep => ({
            id: rep.id,
            title: rep.title,
            type: rep.report_type || 'excel_analysis',
            source: rep.source_file || '—',
            created_at: rep.created_at?.slice(0,16) || '',
            version: rep.version || 1,
            alerts: rep.alerts || [],
            model: rep.generated_by || 'unknown',
            tags: rep.tags || [],
            content: rep.markdown_content || '',
          })));
        }
      } catch(e) { console.error('Vault fetch error:', e); }
      setLoadingReports(false);
    };
    const debounce = setTimeout(fetchReports, search ? 500 : 0);
    return () => clearTimeout(debounce);
  }, [search, activeTag]);

  // Recopilar todos los tags únicos de los reportes visibles
  const allTags = useMemo(() => {
    const set = new Set();
    reports.forEach(r => (r.tags||[]).forEach(t => set.add(t)));
    return Array.from(set).slice(0, 12);
  }, [reports]);

  const filtered = reports.filter(r => {
    const matchFilter = filter==='all' || r.type===filter;
    return matchFilter;
  });

  return (
    <div>
      <div className="page-header">
        <h2>Vault de Reportes</h2>
        <p>{reports.length} reportes · {loadingReports ? 'Cargando...' : 'Actualizado'}</p>
      </div>

      {/* Upload card */}
      <div style={{marginBottom:'14px',padding:'14px 18px',background:'var(--bg-card)',border:'1px dashed var(--border)',borderRadius:'var(--r-lg)',display:'flex',alignItems:'center',gap:'14px'}}>
        <div style={{fontSize:'28px'}}>📤</div>
        <div style={{flex:1}}>
          <div style={{fontSize:'15px',fontWeight:'600',color:'var(--text-1)',marginBottom:'3px'}}>Subir archivo para análisis</div>
          <div style={{fontSize:'13px',color:'var(--text-3)'}}>
            <span style={{color:'var(--accent)'}}>📊 Excel · CSV</span>
            <span style={{color:'var(--text-3)',margin:'0 6px'}}>·</span>
            <span style={{color:'#ff6d00'}}>📄 PDF</span>
            <span style={{color:'var(--text-3)',margin:'0 6px'}}>·</span>
            <span style={{color:'#4285f4'}}>📝 Word · Google Docs (.docx)</span>
            <span style={{color:'var(--text-3)',margin:'0 6px'}}>·</span>
            <span style={{color:'var(--green)'}}>🖼️ Imágenes (PNG · JPG · WEBP)</span>
            <span style={{color:'var(--text-3)',margin:'0 6px'}}>·</span>
            <span style={{color:'var(--text-3)'}}>📃 TXT</span>
          </div>
          <div style={{fontSize:'12px',color:'var(--text-3)',marginTop:'3px',fontFamily:'var(--font-mono)'}}>Ada analiza el contenido y genera un reporte automático con alertas</div>
        </div>
        <label style={{cursor:'pointer'}}>
          <input type="file" style={{display:'none'}} accept=".xlsx,.xls,.csv,.pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp,.gif" onChange={async(e)=>{
            const f=e.target.files[0]; if(!f)return;
            const fd=new FormData(); fd.append('file',f); fd.append('empresa_id',MOCK_USER.empresa_id); fd.append('instruction','Análisis general completo'); fd.append('industry_type','generic');
            try{
              const uploadBtn=e.target.closest('label');
              if(uploadBtn)uploadBtn.style.opacity='0.5';
              const statusDiv=document.createElement('div');
              statusDiv.id='upload-status';
              statusDiv.style.cssText='position:fixed;top:20px;right:20px;padding:14px 20px;background:#101828;border:1px solid var(--accent);border-radius:8px;color:#00e5ff;font-family:monospace;font-size:14px;z-index:9999;';
              statusDiv.textContent='📤 Subiendo y analizando archivo...';
              document.body.appendChild(statusDiv);
              const r=await fetch('https://backend-ada.duckdns.org/files/upload',{method:'POST',headers:{'Authorization':'Bearer '+(MOCK_USER.token||'')},body:fd});
              const d=await r.json();
              if(uploadBtn)uploadBtn.style.opacity='1';
              const st=document.getElementById('upload-status');
              if(d.error){
                if(st){st.style.borderColor='#ff3d5a';st.style.color='#ff3d5a';st.textContent='❌ '+d.error;setTimeout(()=>st.remove(),4000);}
              }else{
                if(st){st.style.borderColor='#00ff9d';st.style.color='#00ff9d';st.textContent='✅ Análisis completado. Recargando reportes...';setTimeout(()=>{st.remove();window.location.reload();},2000);}
              }
            }catch(err){
              const st=document.getElementById('upload-status');
              if(st){st.style.borderColor='#ff3d5a';st.style.color='#ff3d5a';st.textContent='❌ Error subiendo archivo';setTimeout(()=>st.remove(),4000);}
            }
          }}/>
          <div className="btn btn-primary btn-sm">+ Subir archivo</div>
        </label>
      </div>

      <div className="vault-toolbar">
        <div className="vault-search">
          <span className="search-icon">🔍</span>
          <input placeholder="Buscar en todos los reportes..." value={search} onChange={e=>{setSearch(e.target.value);setActiveTag('');}}/>
        </div>
        {['all','excel_analysis','email_draft'].map(f=>(
          <button key={f} className={`filter-chip ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>
            {f==='all'?'Todos':f==='excel_analysis'?'📊 Excel':'✉️ Email'}
          </button>
        ))}
      </div>

      {/* Tag filter bar */}
      {allTags.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'12px',padding:'8px 12px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--r-md)'}}>
          <span style={{fontSize:'11px',fontFamily:'var(--font-hud)',letterSpacing:'1.5px',color:'var(--text-3)',textTransform:'uppercase',alignSelf:'center',marginRight:'4px'}}>🏷 Tags:</span>
          {activeTag && (
            <span className="tag-chip active" onClick={()=>setActiveTag('')}>✕ {activeTag}</span>
          )}
          {allTags.filter(t=>t!==activeTag).map(t=>(
            <span key={t} className="tag-chip" onClick={()=>setActiveTag(t)}>{t}</span>
          ))}
        </div>
      )}

      {filtered.length===0 && (
        <div style={{textAlign:'center',padding:'48px',color:'var(--text-3)'}}>
          <div style={{fontSize:'40px',marginBottom:'12px',opacity:0.4}}>📁</div>
          <div style={{fontFamily:'var(--font-hud)',fontSize:'14px',letterSpacing:'2px'}}>SIN RESULTADOS</div>
        </div>
      )}

      {filtered.map(r=>(
        <div key={r.id} className="report-card" onClick={()=>onNav('report',r.id)}>
          <div className="report-type-icon">{r.type==='excel_analysis'?'📊':r.type==='email_draft'?'✉️':'📋'}</div>
          <div className="report-info">
            <div className="report-title">{r.title}</div>
            <div className="report-meta">
              <span>📎 {r.source||'—'}</span>
              <span>🏷 {r.type.replace('_',' ')}</span>
              <span>v{r.version}</span>
              <span>🕐 {r.created_at}</span>
              <span>🤖 {r.model}</span>
            </div>
            {r.tags && r.tags.length > 0 && (
              <div className="tags-row" onClick={e=>e.stopPropagation()}>
                {r.tags.slice(0,5).map(t=>(
                  <span key={t} className={`tag-chip ${activeTag===t?'active':''}`} onClick={()=>setActiveTag(activeTag===t?'':t)}>{t}</span>
                ))}
              </div>
            )}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',alignItems:'flex-end',flexShrink:0}}>
            <div className={`report-alert-dot ${r.alerts.some(a=>a.level==='critical')?'critical':r.alerts.length?'warning':'none'}`}/>
            {r.alerts.length>0 && (
              <span style={{fontSize:'11px',fontFamily:'var(--font-mono)',color:r.alerts.some(a=>a.level==='critical')?'var(--red)':'var(--yellow)'}}>
                {r.alerts.length} alerta{r.alerts.length>1?'s':''}
              </span>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── REPORT DETAIL ────────────────────────────────────────────────
function ReportDetail({ reportId, onBack, onNav }) {
  const [report, setReport] = useState(null);
  const [links, setLinks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadingLinks, setLoadingLinks] = useState(true);
  const [showGraph, setShowGraph] = useState(false);

  useEffect(()=>{
    const load = async ()=>{
      try{
        const r=await fetch(`https://backend-ada.duckdns.org/api/v1/reports/${reportId}`);
        if(r.ok){
          const d=await r.json();
          setReport({
            id:d.id, title:d.title, type:d.report_type,
            source:d.source_file, created_at:d.created_at?.slice(0,16),
            version:d.version||1,
            alerts:(d.alerts||[]).map(a=>({level:a.level,msg:a.message||a.msg})),
            model:d.generated_by, tags:d.tags||[],
            content:d.markdown_content
          });
        }
      }catch(e){console.error(e);}
      setLoading(false);
    };
    load();
  },[reportId]);

  useEffect(()=>{
    if (!reportId) return;
    const loadLinks = async ()=>{
      setLoadingLinks(true);
      try{
        const r=await fetch(`https://backend-ada.duckdns.org/api/v1/reports/${reportId}/links?empresa_id=${MOCK_USER.empresa_id}`);
        if(r.ok){
          const d=await r.json();
          setLinks(d.links||[]);
        }
      }catch(e){ console.error('Links fetch error:',e); }
      setLoadingLinks(false);
    };
    loadLinks();
  },[reportId]);

  if (loading) return <div style={{padding:'20px',color:'var(--text-3)'}}>⏳ Cargando reporte...</div>;
  if (!report) return <div style={{padding:'20px',color:'var(--red)'}}>Reporte no encontrado.</div>;

  const linkTypeIcon = (lt) => {
    if (!lt) return '🔗';
    if (lt.includes('updates')) return '🔄';
    if (lt.includes('contradicts')) return '⚡';
    if (lt.includes('extends')) return '➕';
    if (lt.includes('mentions')) return '👁';
    return '🔗';
  };

  const linkTypeColor = (lt) => {
    if (!lt) return 'var(--text-3)';
    if (lt.includes('updates')) return 'var(--green)';
    if (lt.includes('contradicts')) return 'var(--red)';
    if (lt.includes('extends')) return 'var(--accent)';
    return 'var(--text-3)';
  };

  return (
    <div>
      <div className="report-detail-header">
        <button className="back-btn" onClick={onBack}>←</button>
        <div className="report-detail-title">{report.title}</div>
        <div className="badge badge-purple">v{report.version}</div>
        <div className="badge">{report.model}</div>
        {links.length > 0 && (
          <div className="badge" style={{background:'var(--accent-glow2)',borderColor:'var(--accent)',color:'var(--accent)',cursor:'pointer'}} onClick={()=>setShowGraph(p=>!p)}>
            🕸 {links.length} vínculo{links.length>1?'s':''}
          </div>
        )}
        <div style={{marginLeft:'auto',display:'flex',gap:'6px'}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>{window.open('/api/v1/reports/'+report.id+'/visual','_blank')}}>📊 Visual</button>
          <button className="btn btn-ghost btn-sm">📋 Copiar</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{window.open('/api/v1/reports/'+report.id+'/pdf','_blank')}}>📥 PDF</button>
        </div>
      </div>

      {/* Tags */}
      {report.tags && report.tags.length > 0 && (
        <div className="tags-row" style={{marginBottom:'12px'}}>
          {report.tags.map(t=>(
            <span key={t} className="tag-chip">{t}</span>
          ))}
        </div>
      )}

      {/* Alerts */}
      {report.alerts.length>0 && (
        <div style={{marginBottom:'16px'}}>
          {report.alerts.map((a,i)=>(
            <div key={i} className={`alert-box ${a.level}`}>
              <span>{a.level==='critical'?'🔴':a.level==='warning'?'⚠️':'📊'}</span>
              <span>{a.msg}</span>
            </div>
          ))}
        </div>
      )}

      {/* Knowledge Graph Mini (toggle) */}
      {(links.length > 0 || showGraph) && (
        <div className="card graph-section" style={{marginBottom:'14px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
            <div className="section-label" style={{margin:0}}>🕸️ Knowledge Graph — Vínculos de este reporte</div>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowGraph(p=>!p)}>
              {showGraph?'Ocultar grafo':'Ver grafo'}
            </button>
          </div>
          {showGraph && (
            <div style={{position:'relative',marginBottom:'10px'}}>
              <KnowledgeGraphMini links={links} onNav={onNav||onBack}/>
            </div>
          )}
        </div>
      )}

      {/* Content */}
      <div className="card" style={{marginBottom:'14px'}}>
        <div className="markdown-body" dangerouslySetInnerHTML={{__html:renderMarkdown(report.content)}}/>
      </div>

      {/* Related reports list */}
      {!loadingLinks && links.length > 0 && (
        <div className="card" style={{marginBottom:'14px'}}>

// ─── APPROVALS ────────────────────────────────────────────────────
function Approvals({ addToast }) {
  const [approvals, setApprovals] = useState([]);
  const [expanded, setExpanded] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    const load = async ()=>{
      try{
        const r=await fetch(`https://backend-ada.duckdns.org/api/v1/reports?empresa_id=${MOCK_USER.empresa_id}&limit=50`);
        if(r.ok){const d=await r.json();const pending=(d.data||[]).filter(rep=>rep.requires_action);setApprovals(pending.map(rep=>({id:rep.id,type:rep.report_type,title:rep.title,desc:rep.source_file||'',thread_id:rep.thread_id,preview:rep.markdown_content?.slice(0,300)||'',created_at:rep.created_at})));}
      }catch(e){console.error(e);}
      setLoading(false);
    }; load();
  },[]);

  const act = async (id, action) => {
    const item = approvals.find(a=>a.id===id);
    if(item?.thread_id){
      try{await fetch(`https://backend-ada.duckdns.org/api/v1/resume/${item.thread_id}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(MOCK_USER.token||'')},body:JSON.stringify({action:action})});}catch(e){console.error(e);}
    }
    setApprovals(prev=>prev.filter(a=>a.id!==id));
    addToast(`Acción ${action==='approve'?'aprobada':'rechazada'}`, action==='approve'?'success':'error');
  };

  return (
    <div>
      <div className="page-header">
        <h2>Aprobaciones Pendientes</h2>
        <p>{approvals.length} acciones requieren tu atención · Human-in-the-Loop</p>
      </div>

      {approvals.length===0 && (
        <div style={{textAlign:'center',padding:'60px',color:'var(--text-3)'}}>
          <div style={{fontSize:'48px',marginBottom:'14px',opacity:0.3}}>✅</div>
          <div style={{fontFamily:'var(--font-hud)',fontSize:'14px',letterSpacing:'2px'}}>BANDEJA VACÍA</div>
          <div style={{fontSize:'14px',marginTop:'6px'}}>No hay aprobaciones pendientes</div>
        </div>
      )}

      {approvals.map(a=>(
        <div key={a.id} className="approval-full-card">
          <div className="approval-card-header" onClick={()=>setExpanded(expanded===a.id?null:a.id)}>
            <div className="approval-icon">{a.type==='email'?'✉️':'📅'}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:'600',color:'var(--text-1)',fontSize:'15px'}}>{a.title}</div>
              <div style={{fontSize:'12px',color:'var(--text-3)',fontFamily:'var(--font-mono)',marginTop:'2px'}}>{a.desc}</div>
            </div>
            <div className={`countdown-chip ${a.urgency}`} style={{marginRight:'10px'}}>
              <div className="dot"/>⏱ {a.expires_in}
            </div>
            <div style={{color:'var(--text-3)',fontSize:'14px'}}>{expanded===a.id?'▲':'▼'}</div>
          </div>

          {expanded===a.id && (
            <div className="approval-card-body">
              <div className="section-label" style={{marginTop:'10px'}}>Vista previa</div>
              <div className="approval-preview">{a.preview}</div>
              <div className="approval-btns">
                <button className="btn btn-primary btn-sm" onClick={()=>act(a.id,'approve')}>✓ Aprobar</button>
                <button className="btn btn-ghost btn-sm">✎ Editar</button>
                <button className="btn btn-danger btn-sm" onClick={()=>act(a.id,'reject')}>✕ Rechazar</button>
              </div>
            </div>
          )}
        </div>
      ))}

      {MOCK_APPROVALS.length>1 && approvals.length>1 && (
        <div style={{marginTop:'16px',display:'flex',gap:'8px',justifyContent:'flex-end'}}>
          <button className="btn btn-ghost btn-sm">Seleccionar todo</button>
          <button className="btn btn-primary btn-sm" onClick={()=>{setApprovals([]);addToast('Todas las acciones aprobadas','success');}}>
            ✓ Aprobar todo ({approvals.length})
          </button>
        </div>
      )}
    </div>
  );
}
